name: GUI

on:
  push:
    branches: [main]
    paths:
      - "gui/**"
      - "internal/**"
      - ".github/workflows/gui.yaml"
  pull_request:
    branches: [main]
    paths:
      - "gui/**"
      - "internal/**"
      - ".github/workflows/gui.yaml"
  workflow_dispatch:

jobs:
  # Fast, toolchain-free checks: frontend build + facade tests + dev-mode compile.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Facade tests (parent module)
        run: go test ./internal/gui/... -count=1

      - name: Frontend build
        working-directory: gui/frontend
        run: |
          npm ci || npm install
          npm run build

      - name: GUI dev-mode compile (no webview link)
        working-directory: gui
        run: go build ./...

  # Full desktop builds + installers per OS.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: gui
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41 -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Build + installer (Windows)
        if: runner.os == 'Windows'
        working-directory: gui
        run: wails build -platform ${{ matrix.platform }} -nsis -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: praetor-gui-${{ runner.os }}
          path: |
            gui/build/bin/*
          if-no-files-found: warn
